name: Update Project Manifest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files
        run: |
          EXCLUDE=("index.html" "404.html" "backupoldindex.html")
          DOMAIN="https://raidio.org"

          # Create projects.json
          echo "[" > projects.json
          first=true
          for f in *.html; do
            skip=false
            for ex in "${EXCLUDE[@]}"; do [[ "$f" == "$ex" ]] && skip=true && break; done
            $skip && continue
            name=$(echo "${f%.html}" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) substr($i,2); print}')
            $first || echo "," >> projects.json
            echo "  { \"file\": \"$f\", \"name\": \"$name\" }" >> projects.json
            first=false
          done
          echo "]" >> projects.json

          # Create sitemap.xml in root
          TODAY=$(date -u +%Y-%m-%d)
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            echo "  <url><loc>${DOMAIN}/</loc><lastmod>${TODAY}</lastmod></url>"
            for f in *.html; do
              skip=false
              for ex in "${EXCLUDE[@]}"; do [[ "$f" == "$ex" ]] && skip=true && break; done
              $skip && continue
              echo "  <url><loc>${DOMAIN}/${f}</loc><lastmod>${TODAY}</lastmod></url>"
            done
            echo '</urlset>'
          } > sitemap.xml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects.json sitemap.xml
          git diff --cached --quiet || (git commit -m "chore: update manifest and sitemap [skip ci]" && git push)
