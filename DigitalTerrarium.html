<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Terrarium: Entropy</title>

<style>
:root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --accent: #ffae00;
    --text: #e0e0e0;
    --flow-speed: 2s;
    --entropy-color: #ff3300;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-y: auto;
    transition: background 0.5s ease;
}

body.bio-tech { --bg: #050a05; --panel: #0a150a; --accent: #00ff66; }
body.cyber-noir { --bg: #0a000a; --panel: #150015; --accent: #ff00ff; }

header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--accent);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    font-size: 11px;
}

#entropy-meter {
    grid-column: span 2;
    height: 4px;
    background: #222;
    margin-top: 5px;
    position: relative;
}

#entropy-fill {
    height: 100%;
    width: 0%;
    background: var(--entropy-color);
    box-shadow: 0 0 10px var(--entropy-color);
    transition: width 0.3s ease;
}

#main-sim {
    display: flex;
    flex-direction: column; 
    gap: 10px;
    padding: 10px;
}

#visualizer {
    background: var(--panel);
    border-radius: 8px;
    display: flex;
    flex-direction: column; 
    justify-content: space-around;
    align-items: center;
    border: 1px solid #333;
    height: 500px;
}

.node {
    width: 100px;
    height: 100px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    background: rgba(0,0,0,0.8);
    transition: all 0.3s ease;
    text-align: center;
}

.node b { font-size: 14px; margin-top: 5px; }

.node.pulse { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }

.pipe {
    width: 2px; 
    height: 40px;
    background: #333;
    position: relative;
    overflow: hidden;
}

.pipe::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 15px;
    background: var(--accent);
    animation: v-flow var(--flow-speed) linear infinite;
}

@keyframes v-flow { from { top: -15px; } to { top: 100%; } }

#ledger {
    background: var(--panel);
    padding: 15px;
    border-radius: 8px;
    font-size: 11px;
    height: 150px;
    overflow-y: auto;
    border: 1px solid #222;
}

.entry { margin-bottom: 5px; border-left: 2px solid var(--accent); padding-left: 5px; }
.stat-val { color: var(--accent); font-weight: bold; }
.crit { color: var(--entropy-color); font-weight: bold; }
</style>
</head>

<body>

<header>
    <div>PROTOCOL: <span id="sim-id" class="stat-val"></span></div>
    <div>TECH: <span id="v-num" class="stat-val">1.0</span></div>
    <div>ENERGY: <span id="energy-val" class="stat-val">0</span>J</div>
    <div>ENTROPY: <span id="ent-val" class="stat-val">0</span>%</div>
    <div id="entropy-meter"><div id="entropy-fill"></div></div>
</header>

<div id="main-sim">
    <div id="visualizer">
        <div class="node" id="node-extract"><span>EXTRACTOR</span><b id="raw-val">0</b></div>
        <div class="pipe"></div>
        <div class="node" id="node-fab"><span>FABRICATOR</span><b id="fab-val">0</b></div>
        <div class="pipe"></div>
        <div class="node" id="node-cons"><span>POPULATION</span><b id="pop-val">10</b></div>
    </div>

    <div id="ledger">
        <div class="entry">Terrarium Initialized. Stability required.</div>
    </div>
</div>

<script>
const SEED = "RAIDIO-" + Math.floor(Math.random()*999);
document.getElementById('sim-id').innerText = SEED;

let state = {
    v: 1.0,
    energy: 150,
    raw: 0,
    refined: 0,
    pop: 10,
    entropy: 0,
    extractorEff: 1.2,
    fabEff: 1.0,
    energyRecovery: 1.0,
    innovationBuffer: 0
};

const ledger = document.getElementById('ledger');

function log(msg, isCrit = false) {
    const div = document.createElement('div');
    div.className = isCrit ? 'entry crit' : 'entry';
    div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    ledger.prepend(div);
    if (ledger.children.length > 20) ledger.lastChild.remove();
}

function pulse(id) {
    const el = document.getElementById(id);
    if(el) {
        el.classList.add('pulse');
        setTimeout(() => el.classList.remove('pulse'), 300);
    }
}

function tick() {
    // 1. CALCULATE COSTS
    // Cost scales with tech and population size
    let cost = 3 + (state.pop * 0.1) + (state.v * 1.5);
    state.energy -= cost;

    // 2. RESOURCE PRODUCTION & ENTROPY
    // Higher extraction rates cause more system heat (Entropy)
    if (state.energy > 0) {
        state.raw += state.extractorEff;
        state.energy += (2 + state.energyRecovery);
        state.entropy += (state.extractorEff * 0.15); 
    } else {
        state.entropy += 1; // Systems overheat when failing
        log("LOW POWER: System friction increasing.", true);
    }

    // 3. FABRICATION & INNOVATION
    if (state.raw >= 5) {
        state.raw -= 5;
        state.refined += state.fabEff;
        state.innovationBuffer += 0.5;
        if (state.innovationBuffer >= 5) {
            evolveSystem();
            state.innovationBuffer = 0;
        }
    }

    // 4. POPULATION CONSUMPTION (The Heat Sink)
    // Humans consume refined goods to grow. 
    // Large populations reduce entropy (maintenance) but cost more energy.
    if (state.refined >= 10) {
        state.refined -= 10;
        state.pop += 1;
        state.entropy -= 3; // Maintenance bonus
        pulse("node-cons");
        log("Human Expansion: Maintenance efficiency increased.");
    }

    // Natural Entropy Decay (Systems cool slightly)
    state.entropy = Math.max(0, state.entropy - 0.05);

    // 5. CHECK FOR COLLAPSE
    if (state.energy <= -50 || state.entropy >= 100) {
        triggerCollapse();
    }

    updateUI();
}

function evolveSystem() {
    const roll = Math.random();
    if (roll < 0.4) {
        state.extractorEff += 0.4;
        log("Invention: High-Speed Drills. (Entropy risk up)");
        pulse("node-extract");
    } else if (roll < 0.8) {
        state.fabEff += 0.2;
        log("Invention: Parallel Fabrication.");
        pulse("node-fab");
    } else {
        state.energyRecovery += 0.6;
        log("Invention: Thermal Capture.");
    }
    state.v += 0.1;
    updateAesthetics();
}

function triggerCollapse() {
    log("!!! CRITICAL FAULT: HEAT/ENERGY LIMIT EXCEEDED !!!", true);
    state.pop = Math.max(2, Math.floor(state.pop * 0.5));
    state.energy = 100;
    state.entropy = 30;
    state.v = Math.max(1.0, state.v - 0.2);
    
    document.body.style.background = "#440000";
    setTimeout(() => updateAesthetics(), 1000);
}

function updateUI() {
    document.getElementById('v-num').innerText = state.v.toFixed(1);
    document.getElementById('energy-val').innerText = Math.floor(state.energy);
    document.getElementById('ent-val').innerText = Math.floor(state.entropy);
    document.getElementById('raw-val').innerText = state.raw.toFixed(1);
    document.getElementById('fab-val').innerText = Math.floor(state.refined);
    document.getElementById('pop-val').innerText = state.pop;

    const fill = document.getElementById('entropy-fill');
    fill.style.width = Math.min(100, state.entropy) + "%";
    
    const speed = Math.max(0.3, 2 - state.v * 0.2);
    document.documentElement.style.setProperty('--flow-speed', speed + 's');
}

function updateAesthetics() {
    document.body.classList.remove('bio-tech', 'cyber-noir');
    if (state.v >= 1.3 && state.v < 1.6) document.body.classList.add('bio-tech');
    if (state.v >= 1.6) document.body.classList.add('cyber-noir');
    document.body.style.background = "";
}

setInterval(tick, 1000);
</script>

</body>
</html>
