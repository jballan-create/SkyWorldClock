<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Terrarium</title>

<style>
:root {
    --bg: #0f0f0f;
    --panel: #1a1a1a;
    --accent: #ffae00;
    --text: #e0e0e0;
    --flow-speed: 2s;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: auto; 
    min-height: 100vh;
    overflow-y: auto; 
    transition: all 1s ease;
}

body.bio-tech { --bg: #050a05; --panel: #0a150a; --accent: #00ff66; }
body.cyber-noir { --bg: #0a000a; --panel: #150015; --accent: #ff00ff; }

header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--accent);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
}

#main-sim {
    display: flex;
    flex-direction: column; 
    gap: 10px;
    padding: 10px;
    flex-grow: 1;
}

#visualizer {
    background: var(--panel);
    border-radius: 8px;
    position: relative;
    display: flex;
    flex-direction: column; 
    justify-content: space-around;
    align-items: center;
    border: 1px solid #333;
    height: 450px;
    padding: 20px 0;
}

.node {
    width: 90px;
    height: 90px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 10px;
    background: rgba(0,0,0,0.8);
    z-index: 2;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.node.pulse {
    transform: scale(1.1);
    box-shadow: 0 0 20px var(--accent);
}

.pipe {
    position: relative;
    width: 2px; 
    height: 50px;
    background: #333;
    z-index: 1;
    overflow: hidden;
}

.pipe::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 20px;
    background: var(--accent);
    animation: v-flow var(--flow-speed) linear infinite;
}

@keyframes v-flow {
    from { top: -20px; }
    to { top: 100%; }
}

#ledger {
    background: var(--panel);
    padding: 15px;
    border-radius: 8px;
    font-size: 11px;
    max-height: 250px;
    overflow-y: auto;
    border: 1px solid #222;
}

.entry {
    margin-bottom: 8px;
    border-left: 2px solid var(--accent);
    padding-left: 5px;
    opacity: 0.8;
}

.stat-val {
    color: var(--accent);
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <div>PROTOCOL: <span id="sim-id" class="stat-val"></span></div>
    <div>TECH: <span id="v-num" class="stat-val">1.0.0</span></div>
    <div>ENG: <span id="energy-val" class="stat-val">0</span>J</div>
</header>

<div id="main-sim">
    <div id="visualizer">
        <div class="node" id="node-extract"><span>EXTRACTOR</span><b id="raw-val">0</b></div>
        <div class="pipe"></div>
        <div class="node" id="node-fab"><span>FABRICATOR</span><b id="fab-val">0</b></div>
        <div class="pipe"></div>
        <div class="node" id="node-cons"><span>HUMANS</span><b id="pop-val">10</b></div>
    </div>

    <div id="ledger">
        <div class="entry">System online. Seed authorized.</div>
    </div>
</div>

<script>
const SEED = "RAIDIO-" + Math.floor(Math.random()*999);
document.getElementById('sim-id').innerText = SEED;

let state = {
    v: 1.0,
    energy: 100,
    raw: 0,
    refined: 0,
    pop: 10,
    extractorEff: 1,
    fabEff: 1,
    energyRecovery: 0,
    patternGraph: { nodes: {} },
    innovationBuffer: 0
};

const ledger = document.getElementById('ledger');

function log(msg) {
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    ledger.prepend(div);
    if (ledger.children.length > 15) ledger.lastChild.remove();
}

function pulse(id) {
    const el = document.getElementById(id);
    if(el) {
        el.classList.add('pulse');
        setTimeout(() => el.classList.remove('pulse'), 300);
    }
}

function capturePattern(event) {
    const key = `${event.input}->${event.output}`;
    if (!state.patternGraph.nodes[key]) {
        state.patternGraph.nodes[key] = { count: 0 };
        log(`Pattern Observed: ${key}`);
    }
    state.patternGraph.nodes[key].count++;
    state.innovationBuffer += 0.2;
}

function generateInvention() {
    const roll = Math.random();
    if (roll < 0.33) return { type: "extractor_overdrive" };
    if (roll < 0.66) return { type: "fabrication_optimization" };
    return { type: "energy_recovery" };
}

function applyInvention(inv) {
    if (!inv) return;
    switch(inv.type) {
        case "extractor_overdrive":
            state.extractorEff += 0.3;
            pulse("node-extract");
            log("Upgraded: Extractor Overdrive");
            break;
        case "fabrication_optimization":
            state.fabEff += 0.3;
            pulse("node-fab");
            log("Upgraded: Fabrication Logic");
            break;
        case "energy_recovery":
            state.energyRecovery += 0.5;
            pulse("node-cons");
            log("Upgraded: Energy Recycling");
            break;
    }
    state.v += 0.1;
    updateFlowSpeed();
    updateAesthetic();
}

function updateFlowSpeed() {
    const speed = Math.max(0.5, 2 - state.v * 0.3);
    document.documentElement.style.setProperty('--flow-speed', speed + 's');
}

function tick() {
    if (state.energy > 5) {
        state.energy -= 2;
        state.raw += state.extractorEff;
        state.energy += 3 + state.energyRecovery;
    }

    if (state.raw >= 5) {
        state.raw -= 5;
        state.refined += state.fabEff;
        capturePattern({input: "raw", output: "refined"});
        log("Human fabrication complete.");
    }

    if (state.innovationBuffer >= 5) {
        applyInvention(generateInvention());
        state.innovationBuffer = 0;
    }
    updateUI();
}

function updateUI() {
    document.getElementById('v-num').innerText = state.v.toFixed(1);
    document.getElementById('energy-val').innerText = Math.floor(state.energy);
    document.getElementById('raw-val').innerText = Math.floor(state.raw);
    document.getElementById('fab-val').innerText = Math.floor(state.refined);
    document.getElementById('pop-val').innerText = state.pop;
}

function updateAesthetic() {
    if (state.v >= 1.3 && state.v < 1.6) {
        document.body.classList.add('bio-tech');
    } else if (state.v >= 1.6) {
        document.body.classList.remove('bio-tech');
        document.body.classList.add('cyber-noir');
    }
}

setInterval(tick, 1000);
</script>

</body>
</html>
