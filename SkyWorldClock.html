<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raidio SkyDial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff88;
    --dim:   #00cc66;
    --bg:    #060410;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(60,10,90,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(0,50,80,0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 10;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    max-width: 400px;
    margin: 0 auto;
  }

  canvas {
    cursor: pointer;
    display: block;
    width: 100%;
    max-width: 340px;
    height: auto;
    filter: drop-shadow(0 0 18px rgba(0,255,136,0.15));
    transition: filter 0.3s;
  }
  canvas:hover { filter: drop-shadow(0 0 28px rgba(0,255,136,0.3)); }

  #clock {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 5vw, 34px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--green);
    text-shadow: 0 0 16px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.2);
    margin-top: 14px;
  }

  #info {
    font-size: clamp(11px, 2vw, 13px);
    color: var(--dim);
    letter-spacing: 0.07em;
    margin-top: 6px;
    text-shadow: 0 0 8px rgba(0,204,102,0.4);
  }

  .selector-wrap {
    position: relative;
    margin-top: 18px;
    width: 100%;
    max-width: 300px;
  }
  .selector-wrap::after {
    content: '▾';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green);
    pointer-events: none;
    font-size: 14px;
  }

  #city-select {
    width: 100%;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding: 10px 36px 10px 14px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s, background 0.2s;
  }
  #city-select:hover, #city-select:focus {
    border-color: rgba(0,255,136,0.7);
    background: rgba(0,255,136,0.1);
  }
  #city-select option   { background: #0d0920; color: var(--green); }
  #city-select optgroup { color: #ffcc00; background: #0d0920; font-style: normal; }

  #coords {
    font-size: 10px;
    color: rgba(0,255,136,0.25);
    letter-spacing: 0.04em;
    margin-top: 5px;
  }

  #hint {
    font-size: 11px;
    color: rgba(0,255,136,0.3);
    letter-spacing: 0.05em;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="wheel" width="340" height="340"></canvas>
  <div id="clock">--:--:-- --</div>
  <div id="info">Loading…</div>
  <div class="selector-wrap">
    <select id="city-select"></select>
  </div>
  <div id="coords"></div>
  <div id="hint">[ click wheel to animate year ]</div>
</div>

// ── Build dropdown ─────────────────────────────────────────────────
const select = document.getElementById('city-select');
for (const [region, cities] of Object.entries(CITIES)) {
  const grp = document.createElement('optgroup');
  grp.label = `— ${region} —`;
  for (const city of cities) {
    const opt = document.createElement('option');
    opt.value = JSON.stringify(city);
    opt.textContent = city.name;
    if (city.name === 'Ottawa, ON') opt.selected = true;
    grp.appendChild(opt);
  }
  select.appendChild(grp);
}

let currentCity = CITIES["Canada"].find(c => c.name === 'Ottawa, ON') || CITIES["Canada"][0];

function applyCity(city) {
  currentCity = city;
  document.getElementById('coords').textContent =
    `${city.lat >= 0 ? city.lat.toFixed(4)+'°N' : Math.abs(city.lat).toFixed(4)+'°S'}  ` +
    `${city.lon >= 0 ? city.lon.toFixed(4)+'°E' : Math.abs(city.lon).toFixed(4)+'°W'}`;
}
applyCity(currentCity);

select.addEventListener('change', () => {
  applyCity(JSON.parse(select.value));
  if (!animating) { clearTimeout(animHandle); liveTick(); }
});

// ── Helpers ────────────────────────────────────────────────────────
function nowLocal(tz)      { return new Date(new Date().toLocaleString('en-US', { timeZone: tz })); }
function toLocal(date, tz) { return new Date(date.toLocaleString('en-US', { timeZone: tz })); }
function formatTime(d) {
  const h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
  return `${h%12||12}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${h<12?'AM':'PM'}`;
}
function fmtHM(d) {
  return d && d.toString() !== 'Invalid Date'
    ? `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
    : '--:--';
}
function toH(d) { return d.getHours() + d.getMinutes()/60 + d.getSeconds()/3600; }
function getSunTimes(date, lat, lon, tz) {
  const t = SunCalc.getTimes(date, lat, lon);
  return { dawn: toLocal(t.dawn,tz), sunrise: toLocal(t.sunrise,tz), sunset: toLocal(t.sunset,tz), dusk: toLocal(t.dusk,tz) };
}

// ── Canvas ─────────────────────────────────────────────────────────

const ctx    = canvas.getContext('2d');
const S = canvas.width, CX = S/2, CY = S/2, R = S/2 - 28;

function hAngle(h) { return Math.PI/2 + (h/24)*2*Math.PI; }
function hXY(h, r) { const a=hAngle(h); return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
function arc(h0, h1, color) {
  if (Math.abs(h1-h0) < 0.001) return;
  ctx.beginPath(); ctx.moveTo(CX,CY);
  ctx.arc(CX,CY,R,hAngle(h0),hAngle(h1<=h0?h1+24:h1),false);
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
}

function drawWheel(dt, dawn, sunrise, sunset, dusk, label) {
  ctx.clearRect(0,0,S,S);
  const valid = d => d && d.toString() !== 'Invalid Date';
  const dawnH=valid(dawn)?toH(dawn):0, srH=valid(sunrise)?toH(sunrise):0;
  const ssH=valid(sunset)?toH(sunset):24, duskH=valid(dusk)?toH(dusk):24, nowH=toH(dt);

  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI); ctx.fillStyle='#0d0920'; ctx.fill();
  if (valid(sunrise) && valid(sunset)) {
    arc(dawnH,srH,'#60154a'); arc(srH,ssH,'#1a00cc'); arc(ssH,duskH,'#3d134f');
  }
  const g=ctx.createRadialGradient(CX,CY,R*0.3,CX,CY,R);
  g.addColorStop(0,'rgba(0,0,0,0.25)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI); ctx.fillStyle=g; ctx.fill();

  for (let h=0;h<24;h++) {
    const [ox,oy]=hXY(h,R),[ix,iy]=hXY(h,R-14);
    ctx.beginPath(); ctx.moveTo(ix,iy); ctx.lineTo(ox,oy);
    ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=h%6===0?3:1.5; ctx.stroke();
    if (h%3===0) {
      const [lx,ly]=hXY(h,R-28);
      ctx.font='bold 13px "Share Tech Mono"'; ctx.fillStyle='#ffcc00';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(String(h),lx,ly);
    }
  }
  ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI); ctx.strokeStyle='rgba(0,255,136,0.2)'; ctx.lineWidth=2; ctx.stroke();

  if (valid(sunrise) && valid(sunset)) {
    for (const h of [srH,ssH]) {
      const [mx,my]=hXY(h,R);
      ctx.beginPath(); ctx.arc(mx,my,9,0,2*Math.PI);
      ctx.fillStyle='#ff4d00'; ctx.fill(); ctx.strokeStyle='#ff9900'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }
  const [sx,sy]=hXY(nowH,R);
  const sg=ctx.createRadialGradient(sx,sy,2,sx,sy,28);
  sg.addColorStop(0,'rgba(255,204,0,0.5)'); sg.addColorStop(1,'rgba(255,204,0,0)');
  ctx.beginPath(); ctx.arc(sx,sy,28,0,2*Math.PI); ctx.fillStyle=sg; ctx.fill();
  ctx.beginPath(); ctx.arc(sx,sy,18,0,2*Math.PI);
  ctx.fillStyle='#ffcc00'; ctx.fill(); ctx.strokeStyle='#ff9900'; ctx.lineWidth=2.5; ctx.stroke();

  const short=label.split(',')[0].toUpperCase();
  ctx.font=`${short.length>10?9:11}px "Share Tech Mono"`;
  ctx.fillStyle='rgba(0,255,136,0.35)'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(short,CX,CY);
}

// ── Tick & animation ───────────────────────────────────────────────
const clockEl=document.getElementById('clock');
const infoEl=document.getElementById('info');
const hintEl=document.getElementById('hint');

function updateDisplay(dt,sunrise,sunset) {
  clockEl.textContent=formatTime(dt);
  const ds=dt.toLocaleDateString('en-CA',{year:'numeric',month:'2-digit',day:'2-digit'});
  infoEl.textContent=`${ds}  ↑ ${fmtHM(sunrise)}  ↓ ${fmtHM(sunset)}`;
}

let animating=false, animHandle=null;

function liveTick() {
  if (animating) return;
  const {lat,lon,tz,name}=currentCity;
  const dt=nowLocal(tz);
  let t; try { t=getSunTimes(dt,lat,lon,tz); } catch(e) { t={dawn:null,sunrise:null,sunset:null,dusk:null}; }
  drawWheel(dt,t.dawn,t.sunrise,t.sunset,t.dusk,name);
  updateDisplay(dt,t.sunrise,t.sunset);
  animHandle=setTimeout(liveTick,1000);
}

canvas.addEventListener('click', () => {
  if (animating) { animating=false; hintEl.textContent='[ click wheel to animate year ]'; clearTimeout(animHandle); liveTick(); return; }
  animating=true; clearTimeout(animHandle); hintEl.textContent='[ click to stop ]';
  const {lat,lon,tz,name}=currentCity;
  const base=nowLocal(tz); base.setHours(0,0,0,0);
  const STEPS=96, DELAY=8, MAX=365; let day=0, frame=0;
  function next() {
    if (!animating) return;
    if (day>=MAX) { animating=false; hintEl.textContent='[ click wheel to animate year ]'; liveTick(); return; }
    const dt=new Date(base.getTime()+(day*24+(24/STEPS)*frame)*3600000);
    const dtL=toLocal(dt,tz);
    try { const t=getSunTimes(dtL,lat,lon,tz); drawWheel(dtL,t.dawn,t.sunrise,t.sunset,t.dusk,name); updateDisplay(dtL,t.sunrise,t.sunset); } catch(e){}
    frame++; if(frame>=STEPS){frame=0;day++;} animHandle=setTimeout(next,DELAY);
  }
  next();
});

liveTick();
</script>
