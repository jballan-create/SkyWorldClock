<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORKSHOP // HUB</title>
  <link rel="icon" type="image/x-icon" href="Raidio.ico">
  <meta name="description" content="[ RAIDIO.ORG ] // A centralized repository of digital fragments, technical experiments, and archived modules. Accessing terminal output...">

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

:root {
  --green:  #00ff88;
  --dim:    #00cc66;
  --faint:  rgba(0,255,136,0.15);
  --bg:     #060410;
  --card-size: min(92vw, 560px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--green);
  overflow-y: auto;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 0 48px;
}

/* scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  pointer-events: none;
  z-index: 100;
}

/* ambient glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(60,10,90,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(0,50,80,0.25) 0%, transparent 55%);
  pointer-events: none;
}

/* ─── Layout ─────────────────────────────────────────────────────── */
#hub {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: var(--card-size);
}

/* ─── Header ─────────────────────────────────────────────────────── */
#header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: rgba(0,255,136,0.05);
  border: 1px solid rgba(0,255,136,0.25);
  border-bottom: none;
  user-select: none;
}

#-name {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(10px, 2.5vw, 14px);
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--green);
  text-shadow: 0 0 12px rgba(0,255,136,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}

#counter {
  font-size: 11px;
  color: rgba(0,255,136,0.4);
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

/* ─── Viewport ───────────────────────────────────────────────────── */
#viewport {
  width: 100%;
  position: relative;
  border: 1px solid rgba(0,255,136,0.25);
  background: #0d0920;
  /* no fixed height — grows with iframe content */
}

#-frame {
  width: 100%;
  height: 0; /* set dynamically by JS */
  min-height: 300px;
  border: none;
  display: block;
  background: transparent;
  overflow: hidden;
}

/* Loading overlay */
#loading {
  position: absolute;
  inset: 0;
  min-height: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0d0920;
  gap: 16px;
  transition: opacity 0.3s;
  z-index: 10;
}
#loading.hidden { opacity: 0; pointer-events: none; }

.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(0,255,136,0.15);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loading-label {
  font-size: 11px;
  color: rgba(0,255,136,0.4);
  letter-spacing: 0.1em;
}

/* Empty/error state */
#empty {
  position: absolute;
  inset: 0;
  min-height: 300px;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(0,255,136,0.3);
  font-size: 12px;
  letter-spacing: 0.07em;
  text-align: center;
  padding: 24px;
}
#empty.visible { display: flex; }
#empty a { color: var(--green); }

/* ─── Nav bar ────────────────────────────────────────────────────── */
#nav {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0;
  border: 1px solid rgba(0,255,136,0.25);
  border-top: 1px solid rgba(0,255,136,0.1);
  background: rgba(0,255,136,0.03);
}

.nav-btn {
  background: none;
  border: none;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px;
  padding: 10px 22px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  line-height: 1;
}
.nav-btn:hover { background: rgba(0,255,136,0.1); }
.nav-btn:active { background: rgba(0,255,136,0.2); }
.nav-btn:disabled { color: rgba(0,255,136,0.15); cursor: default; }
.nav-btn:disabled:hover { background: none; }

/* Dot indicators */
#dots {
  display: flex;
  align-items: center;
  gap: 7px;
  flex: 1;
  justify-content: center;
  overflow: hidden;
  padding: 0 4px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(0,255,136,0.2);
  flex-shrink: 0;
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}
.dot.active {
  background: var(--green);
  transform: scale(1.35);
  box-shadow: 0 0 6px rgba(0,255,136,0.6);
}
.dot:hover { background: rgba(0,255,136,0.5); }

/* ─── Footer ─────────────────────────────────────────────────────── */
#footer {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  font-size: 9px;
  color: rgba(0,255,136,0.2);
  letter-spacing: 0.06em;
}

#open-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: rgba(0,255,136,0.35);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 0;
  transition: color 0.15s;
}
#open-btn:hover { color: var(--green); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     CRAWLER INDEX — hidden from UI, visible to search bots & previews.
     Add a line here whenever you add a new .html project to the repo.
     ═══════════════════════════════════════════════════════════════ -->
<nav id="crawler-index" style="display:none" aria-hidden="true">
  <a href="./SkyWorldClock.html">Sky World Clock</a>
  <a href="./TieDye.html">Tie Dye</a>
</nav>

<div id="hub">
  <div id="header">
    <div id="-name">SCANNING…</div>
    <div id="counter">—/—</div>
  </div>

  <div id="viewport">
    <iframe id="-frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
      title="project preview">
    </iframe>

    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-label">FETCHING MANIFEST…</div>
    </div>

    <div id="empty">
      <div>NO PROJECTS FOUND</div>
      <div style="font-size:10px; margin-top:4px; opacity:0.7;">
        Add <code>.html</code> files to your repo root.<br>
        They will appear here automatically.
      </div>
      <div id="empty-debug" style="font-size:9px; margin-top:8px; opacity:0.4;"></div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">←</button>
    <div id="dots"></div>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">→</button>
  </div>

  <div id="footer">
    <span id="footer-file"></span>
    <button id="open-btn" onclick="openCurrent()">↗ open</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════
const MANUAL_USER = 'jballan-create';
const MANUAL_REPO = 'SkyWorldClock';
const EXCLUDE = new Set(['index.html', '404.html', 'backupoldindex.html']);

let projects = [];
let current  = 0;
let _resizeObserver = null;

// ═══════════════════════════════════════════════════════════════════
//  IFRAME AUTO-RESIZE
//  Reads the iframe document height and stretches the frame to fit,
//  so the outer page scrolls instead of the iframe.
// ═══════════════════════════════════════════════════════════════════
function autoResizeFrame() {
  const frame = document.getElementById('-frame');
  try {
    const doc  = frame.contentDocument || frame.contentWindow.document;
    const body = doc.body;
    const html = doc.documentElement;

    // Force iframe body to not scroll internally
    body.style.overflow = 'hidden';
    html.style.overflow = 'hidden';

    const height = Math.max(
      body.scrollHeight, body.offsetHeight,
      html.scrollHeight, html.offsetHeight
    );

    frame.style.height = Math.max(height, 300) + 'px';

    // Watch for dynamic content changes (canvas draws, animations settling)
    if (_resizeObserver) _resizeObserver.disconnect();
    _resizeObserver = new ResizeObserver(() => {
      const h = Math.max(
        body.scrollHeight, body.offsetHeight,
        html.scrollHeight, html.offsetHeight
      );
      frame.style.height = Math.max(h, 300) + 'px';
    });
    _resizeObserver.observe(body);

  } catch (e) {
    // Cross-origin fallback — just use a generous default
    frame.style.height = '600px';
  }
}

// ═══════════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════════
async function boot() {
  try {
    await loadFromManifest();
  } catch (_) {
    try {
      await loadFromAPI({ user: MANUAL_USER, repo: MANUAL_REPO });
    } catch (err) {
      console.error(err);
      showEmpty(`Error: ${err.message}`);
      return;
    }
  }

  if (projects.length === 0) { showEmpty('No .html projects found in root.'); return; }
  buildDots();
  goto(0);
}

async function loadFromManifest() {
  setLoadingLabel('LOADING MANIFEST…');
  const res = await fetch('./projects.json');
  if (!res.ok) throw new Error('projects.json not found');
  const arr = await res.json();
  projects = arr.map(p => ({
    file: p.file,
    url:  './' + p.file,
    name: p.name || fileToTitle(p.file)
  }));
}

async function loadFromAPI({ user, repo }) {
  setLoadingLabel('SCANNING REPO…');
  const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const files = await res.json();
  projects = files
    .filter(f => f.type === 'file' && f.name.endsWith('.html') && !EXCLUDE.has(f.name))
    .map(f => ({ file: f.name, url: './' + f.name, name: fileToTitle(f.name) }));
}

// ═══════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function goto(index) {
  if (projects.length === 0) return;
  current = index;
  const p = projects[index];

  document.getElementById('-name').textContent    = p.name.toUpperCase();
  document.getElementById('counter').textContent  = `${index + 1}/${projects.length}`;
  document.getElementById('footer-file').textContent = p.file;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === index));

  showLoading();

  // Disconnect any observer from the previous project
  if (_resizeObserver) { _resizeObserver.disconnect(); _resizeObserver = null; }

  const frame = document.getElementById('-frame');
  frame.style.height = '300px'; // reset before load
  frame.onload = () => {
    // Small delay lets canvas/animation frames settle before measuring
    setTimeout(() => {
      autoResizeFrame();
      hideLoading();
      // Scroll hub back to top so user sees the project from the start
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 120);
  };
  frame.src = p.url;
}

function navigate(dir) {
  goto((current + dir + projects.length) % projects.length);
}

function openCurrent() {
  if (projects[current]) window.open(projects[current].url, '_blank');
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function fileToTitle(f) {
  return f.replace('.html', '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function setLoadingLabel(t) { document.getElementById('loading-label').textContent = t; }
function showEmpty(msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('empty').classList.add('visible');
  document.getElementById('empty-debug').textContent = msg;
}
function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading()  { document.getElementById('loading').classList.add('hidden'); }

function buildDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  if (projects.length > 20) { dotsEl.textContent = '—'; return; }
  projects.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.onclick = () => goto(i);
    dotsEl.appendChild(d);
  });
}

boot();
</script>
</body>
</html>
