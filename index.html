<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raidio SkyDial</title>
<link rel="icon" type="image/x-icon" href="Raidio.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00ff88;
    --dim:    #00cc66;
    --bg:     #060410;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--green);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(60,10,90,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 70%, rgba(0,50,80,0.3) 0%, transparent 60%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 10;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  canvas {
    cursor: pointer;
    display: block;
    filter: drop-shadow(0 0 18px rgba(0,255,136,0.15));
    transition: filter 0.3s;
  }
  canvas:hover { filter: drop-shadow(0 0 28px rgba(0,255,136,0.3)); }

  #clock {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 5vw, 34px);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--green);
    text-shadow: 0 0 16px rgba(0,255,136,0.6), 0 0 40px rgba(0,255,136,0.2);
    margin-top: 14px;
  }

  #info {
    font-size: clamp(11px, 2vw, 13px);
    color: var(--dim);
    letter-spacing: 0.07em;
    margin-top: 6px;
    text-shadow: 0 0 8px rgba(0,204,102,0.4);
  }

  .selector-wrap {
    position: relative;
    margin-top: 18px;
    width: 300px;
  }

  .selector-wrap::after {
    content: '\25be';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--green);
    pointer-events: none;
    font-size: 14px;
  }

  #city-select {
    width: 100%;
    background: rgba(0,255,136,0.05);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    padding: 10px 36px 10px 14px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s, background 0.2s;
  }
  #city-select:hover, #city-select:focus {
    border-color: rgba(0,255,136,0.7);
    background: rgba(0,255,136,0.1);
  }
  #city-select option { background: #0d0920; color: var(--green); }
  #city-select optgroup { color: #ffcc00; background: #0d0920; font-style: normal; }

  #coords {
    font-size: 10px;
    color: rgba(0,255,136,0.25);
    letter-spacing: 0.04em;
    margin-top: 5px;
  }

  #hint {
    font-size: 11px;
    color: rgba(0,255,136,0.3);
    letter-spacing: 0.05em;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="wheel" width="340" height="340"></canvas>
  <div id="clock">--:--:-- --</div>
  <div id="info">Loading…</div>
  <div class="selector-wrap">
    <select id="city-select"></select>
  </div>
  <div id="coords"></div>
  <div id="hint">[ click wheel to animate year ]</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

</html>
